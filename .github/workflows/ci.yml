name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install uv
        run: pip install uv

      - name: Run tests
        run: |
          uv venv /tmp/testenv
          uv pip install --python /tmp/testenv/bin/python -e ".[dev]"
          /tmp/testenv/bin/pytest

      - name: Build
        run: uv build

      - name: Test the built wheel
        run: |
          uv venv /tmp/wheelenv
          uv pip install --python /tmp/wheelenv/bin/python dist/*.whl
          /tmp/wheelenv/bin/burnie --help
